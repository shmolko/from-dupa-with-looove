<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>From Dupa With Looove</title>
  <link rel="stylesheet" href="./src/styles.css">
</head>
<body>
  <div class="page-shell">
    <!-- Home -->
    <section id="viewHome" class="view view-home" data-view="home">
      <header class="view-header">
        <div class="app-title-wrap">
          <h1 class="app-title">From Dupa With Looove</h1>
          <p class="app-description">Microdosing české gramatiky. Pro zábavu a potěšení.</p>
        </div>
        <button id="statsButton" class="ghost-button" type="button" aria-label="Statistiky">Statistiky</button>
      </header>
      <div class="home-content">
        <h2>Co chceš procvičit?</h2>
        <section id="topicSelector" class="topic-selector" aria-label="Výběr gramatického jevu"></section>
        <p id="profileStatus" class="status-text" aria-live="polite"></p>
        <button id="generateLessonButton" class="primary-button primary-button--large" type="button">Davaj het!</button>
        <div id="lastLessonChip" class="last-lesson-chip hidden"></div>
      </div>
    </section>

    <!-- Lesson (full-screen, one question) -->
    <section id="viewLesson" class="view view-lesson hidden" data-view="lesson">
      ...
    </section>

    <!-- Theory -->
    <section id="viewTheory" class="view view-theory hidden" data-view="theory">
      <header class="view-header">
        <button id="theoryBackButton" class="ghost-button" type="button" aria-label="Zpět">←</button>
        <h2 id="theoryTitle" class="theory-title">Teorie</h2>
      </header>
      <div id="theoryContent" class="theory-content"></div>
    </section>

    <!-- Stats -->
    ...
  </div>
  ...
</body>
</html>
