<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>From Dupa With Looove</title>
  <link rel="stylesheet" href="./src/styles.css">
</head>
<body>
  <div class="page-shell">
    <!-- Home -->
    <section id="viewHome" class="view view-home" data-view="home">
      <header class="view-header">
        <h1 class="app-title">From Dupa With Looove</h1>
        <button id="statsButton" class="ghost-button" type="button" aria-label="Statistiky">Statistiky</button>
      </header>
      <div class="home-content">
        <h2>Co chceš procvičit?</h2>
        <section id="topicSelector" class="topic-selector" aria-label="Výběr gramatického jevu"></section>
        <p id="profileStatus" class="status-text" aria-live="polite"></p>
        <button id="generateLessonButton" class="primary-button primary-button--large" type="button">Vygenerovat lekci</button>
        <div id="lastLessonChip" class="last-lesson-chip hidden"></div>
      </div>
    </section>

    <!-- Lesson (full-screen, one question) -->
    <section id="viewLesson" class="view view-lesson hidden" data-view="lesson">
      <header class="lesson-header">
        <button id="lessonBackButton" class="ghost-button lesson-back" type="button" aria-label="Zpět">←</button>
        <div class="lesson-progress">
          <span id="lessonCounter">1 / 10</span>
          <div class="progress-bar">
            <div id="lessonProgressBar" class="progress-value"></div>
          </div>
        </div>
      </header>
      <div class="lesson-body">
        <p id="exerciseType" class="exercise-type"></p>
        <p id="exercisePrompt" class="exercise-prompt"></p>
        <form id="answerForm" class="answer-form">
          <div id="exerciseChoices" class="choice-list"></div>
          <label id="textAnswerField" class="field hidden">
            <span>Opravená věta</span>
            <input id="textAnswerInput" type="text" autocomplete="off">
          </label>
        </form>
      </div>
      <div id="feedbackCard" class="feedback-card hidden"></div>
      <div class="lesson-footer">
        <button id="submitAnswerButton" class="primary-button primary-button--sticky" type="submit" form="answerForm" aria-label="Zkontrolovat odpověď">Zkontrolovat</button>
        <button id="nextQuestionButton" class="primary-button primary-button--sticky hidden" type="button">Další věta</button>
      </div>
    </section>

    <!-- Summary -->
    <section id="viewSummary" class="view view-summary hidden" data-view="summary">
      <div class="summary-content">
        <h2>Lekce dokončena ♥</h2>
        <div id="summaryStats" class="summary-stats"></div>
        <div id="summaryWeakPatterns" class="summary-weak-patterns"></div>
        <button id="newLessonButton" class="primary-button primary-button--large" type="button">Nová lekce</button>
      </div>
    </section>

    <!-- Stats (dashboard) -->
    <section id="viewStats" class="view view-stats hidden" data-view="stats">
      <header class="view-header">
        <h2>Přehled zádrhelů</h2>
        <button id="statsCloseButton" class="ghost-button" type="button">Zavřít</button>
      </header>
      <p class="panel-copy">Aplikace si pamatuje, jestli bývá problém spíš zvratnou částici doplnit, nebo ji naopak vynechat.</p>
      <article class="stats-card">
        <h3>Nejčastější slabiny</h3>
        <ul id="weakPatternsList" class="list"></ul>
      </article>
      <article class="stats-card">
        <h3>Poslední lekce</h3>
        <ul id="recentLessonsList" class="list"></ul>
      </article>
      <button id="resetProgressButton" class="ghost-button" type="button">Resetovat pokrok</button>
    </section>
  </div>

  <script src="./src/content/reflexive-verbs.js"></script>
  <script src="./src/content/similar-words.js"></script>
  <script src="./src/content/index.js"></script>
  <script src="./src/lesson-engine.js"></script>
  <script src="./src/app.js"></script>
</body>
</html>
